<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Family Dashboard</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="photo-stage">
      <div class="photo-slot" id="slot-a">
        <img class="photo-bg" id="bg-a" alt="" aria-hidden="true" />
        <img class="photo-fg" id="fg-a" alt="" />
      </div>
      <div class="photo-slot" id="slot-b">
        <img class="photo-bg" id="bg-b" alt="" aria-hidden="true" />
        <img class="photo-fg" id="fg-b" alt="" />
      </div>
    </div>

    <div class="panel panel-clock">
      <div class="clock-time" id="clock-time"></div>
      <div class="clock-date" id="clock-date"></div>
    </div>

    <div class="panel panel-weather" id="weather"></div>

    <div class="panel panel-calendar" id="calendar"></div>

    <div class="panel panel-sensors" id="sensors"></div>

    <div class="panel panel-electricity" id="electricity"></div>

    <div class="caption" id="caption-a"></div>
    <div class="caption" id="caption-b"></div>

    <button class="cam-btn" id="cam-btn" title="Kamerat" hidden>
      <svg viewBox="0 0 24 24" width="24" height="24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>

    <div class="cam-overlay" id="cam-overlay" hidden>
      <button class="cam-close" id="cam-close" aria-label="Sulje">✕</button>
      <div class="cam-grid" id="cam-grid"></div>
    </div>

    <button class="refresh-btn" id="refresh" title="Päivitä">
      <svg class="refresh-ring" viewBox="0 0 56 56" aria-hidden="true">
        <circle class="refresh-ring-track" cx="28" cy="28" r="26"></circle>
        <circle class="refresh-ring-progress" cx="28" cy="28" r="26"></circle>
      </svg>
      <span class="refresh-icon">↻</span>
    </button>

    <div class="pw-overlay" id="pw-overlay" hidden>
      <form class="pw-box" id="pw-form">
        <label class="pw-label" for="pw-input">Salasana</label>
        <input class="pw-input" id="pw-input" type="password" autocomplete="current-password" />
        <button class="pw-btn" type="submit">OK</button>
      </form>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
